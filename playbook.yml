---
# Thin wrapper: this repository is itself the ansible-rivendell role
# (Galaxy-installable at the repo root). Including it by directory keeps
# `ansible-playbook playbook.yml` working without requiring the repo to be
# checked out under a roles/ path.
- name: Deploy Rivendell
  hosts: all
  become: true
  tasks:
    - name: Include the rivendell role
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}"
